<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murmble - 下载</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #242631;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #e2e4e9;
            --text-muted: rgba(226, 228, 233, 0.45);
            --accent: #a78bfa;
            --accent-dim: rgba(167, 139, 250, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #2d303d, #1e2029);
            color: var(--text-color);
            min-height: 100vh;
            padding: 60px 24px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 40px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        .back-link svg { width: 16px; height: 16px; }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-radius: 14px;
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--glass-border);
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.2s ease;
        }

        .file-item:hover {
            border-color: rgba(167, 139, 250, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .file-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent-dim);
            border: 1px solid rgba(167, 139, 250, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .file-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 2;
        }

        .file-info { flex: 1; min-width: 0; }

        .file-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .file-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .file-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .badge-exe {
            background: rgba(74, 222, 128, 0.12);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .badge-msi {
            background: rgba(96, 165, 250, 0.12);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回首页
        </a>
        <h1>下载 Murmble</h1>
        <p class="subtitle">选择适合你的安装包格式</p>
        <div class="file-list" id="file-list">
        </div>
    </div>

    <script>
        async function loadReleases() {
            const container = document.getElementById('file-list');
            try {
                const resp = await fetch('./releases.json');
                if (!resp.ok) throw new Error('No releases.json');
                const data = await resp.json();

                if (!data.files || data.files.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>暂无可用的安装包，请稍后再试。</p></div>';
                    return;
                }

                document.title = `Murmble ${data.version} - 下载`;

                container.innerHTML = data.files.map(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    const badgeClass = ext === 'exe' ? 'badge-exe' : 'badge-msi';
                    const badgeText = ext === 'exe' ? 'NSIS' : 'MSI';
                    const desc = ext === 'exe' ? '推荐 · NSIS 安装程序' : 'Windows Installer 包';

                    return `
                        <a href="./${file.name}" class="file-item" download>
                            <div class="file-icon">
                                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                            </div>
                            <div class="file-info">
                                <div class="file-name">${file.name}</div>
                                <div class="file-meta">${desc} · ${file.size}</div>
                            </div>
                            <span class="file-badge ${badgeClass}">${badgeText}</span>
                        </a>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div class="empty-state"><p>暂无可用的安装包，请稍后再试。</p></div>';
            }
        }

        loadReleases();
    </script>
</body>
</html>
